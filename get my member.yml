info:
  name: get my member
  type: http
  seq: 1

http:
  method: GET
  url: https://api.trello.com/1/members/:id
  params:
    - name: id
      value: "{{trello_username}}"
      type: path
  auth: inherit

runtime:
  variables:
    - name: trello_username
      value: lukasz36773668
  scripts:
    - type: tests
      code: |-
        test("Status code is 200", function () {
            expect(res.getStatus()).to.equal(200);
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.username
      operator: eq
      value: "{{trello_username}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
